<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="ns-bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e0a12"/>
    </linearGradient>
    <linearGradient id="ns-accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D11A46"/>
      <stop offset="1" stop-color="#9B1335"/>
    </linearGradient>
    <linearGradient id="ns-olive" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#7A9A3A"/>
      <stop offset="1" stop-color="#4D6D1A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="24" fill="url(#ns-bg)"/>
  <rect x="40" y="40" width="720" height="370" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Brand mark -->
  <rect x="80" y="72" width="56" height="56" rx="14" fill="url(#ns-accent)"/>
  <text x="108" y="110" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="28" font-weight="800">N</text>
  <text x="156" y="98" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="36" font-weight="800">Naini</text>
  <text x="156" y="132" fill="#7A9A3A" font-family="system-ui,sans-serif" font-size="36" font-weight="800">Store</text>
  <text x="156" y="158" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="16">Hyperlocal À Food À Bazaar À Delivery</text>
  <!-- Feature cards -->
  <rect x="80" y="200" width="190" height="150" rx="12" fill="#2a0f18" stroke="#D11A46" stroke-width="2"/>
  <text x="175" y="238" text-anchor="middle" fill="#fda4af" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Orders</text>
  <text x="175" y="268" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">Master + Sub</text>
  <text x="175" y="290" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">Multi-store cart</text>
  <text x="175" y="318" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Spring Boot À MongoDB</text>
  <rect x="305" y="200" width="190" height="150" rx="12" fill="#142006" stroke="url(#ns-olive)" stroke-width="2"/>
  <text x="400" y="238" text-anchor="middle" fill="#bef264" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Delivery</text>
  <text x="400" y="268" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">Multi-pickup</text>
  <text x="400" y="290" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">Zones À COD</text>
  <text x="400" y="318" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">4 React SPAs</text>
  <rect x="530" y="200" width="190" height="150" rx="12" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="625" y="238" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Payments</text>
  <text x="625" y="268" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">Razorpay</text>
  <text x="625" y="290" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">FCM À Cloudinary</text>
  <text x="625" y="318" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Seller À Admin</text>
  <!-- Live badge -->
  <circle cx="680" cy="88" r="6" fill="#22c55e"/>
  <text x="694" y="93" fill="#86efac" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Live</text>
  <text x="400" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">nainistore.com À seller À delivery À admin</text>
